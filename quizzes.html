        <div class="navbar">

                <a href="index.html" class="brand">Cheminuity</a>
                <a href="dashboard.html" class="navbar-link">Dashboard</a>

        <div class="bodycontent">
            <h1>Quizzes</h1>
            <div class="screenshot screenshot-lg">
                <div class="text-center">
                    <strong>Practice Quizzes</strong>
                    <p class="mt-8">Short quizzes per lesson to test recall and reinforce concepts — timed or untimed.</p>
                </div>
            </div>
            <p class="mt-12">Each lesson can include a short quiz.</p>

            <section class="quiz mt-18">
                <h3>Sample Quiz — Lesson 1.1</h3>
                <p>Which particle has a positive charge?</p>
                <label><input type="radio" name="q1" value="proton"> Proton</label><br>
                <label><input type="radio" name="q1" value="electron"> Electron</label><br>
                <label><input type="radio" name="q1" value="neutron"> Neutron</label><br>
                <button id="checkQuiz" class="primary-btn mt-8">Check Answer</button>
                <div id="quizResult" class="form-message" aria-live="polite"></div>
            </section>
        </div>

        <script src="scripts/main.js" defer></script>
