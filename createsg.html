<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Create Study Group</title>
        <link rel="stylesheet" href="Style.css">
    </head>
    <body>
        <div class="navbar">
            <div class="navleft">
                <a href="index.html" class="brand">Cheminuity</a>
                <a href="dashboard.html" class="navbar-link">Dashboard</a>
                <a href="content.html" class="navbar-link">Content</a>
                <a href="study-groups.html" class="navbar-link">Study Groups</a>
                <a href="tutors.html" class="navbar-link">Tutor</a>
            </div>

            <div class ="navright" id="navright">
                <a href="login.html" class="button">Login</a>
                <a href="signin.html" class="nav-link">Sign up</a>
            </div>
        </div>

        <div class="bodycontent">
            <h1>Create Study Group</h1>
            <div class="screenshot screenshot-sm">
                <div class="text-center">
                    <strong>Example group</strong>
                    <p class="mt-8">Stoichiometry Practice — Next meeting: Jan 14 • 5:00 PM</p>
                </div>
            </div>
            <p class="mt-12">Form to set group name, subject, schedule, and privacy.</p>

            <form id="createGroupForm" class="group-form resource-card mt-12">
                <label>Group name<br><input id="groupName" type="text" placeholder="e.g. Stoichiometry Study"></label><br>
                <label>Subject<br><input id="groupSubject" type="text" placeholder="Chemistry"></label><br>
                <label>Next meeting date<br><input id="meetingDate" type="date"></label><br>
                <label>Next meeting time<br><input id="meetingTime" type="time"></label><br>
                <label>Recurrence<br>
                  <select id="meetingRecurrence">
                    <option value="none">None</option>
                    <option value="weekly">Weekly</option>
                    <option value="biweekly">Bi-weekly</option>
                    <option value="monthly">Monthly</option>
                  </select>
                </label><br>
                <label>Meeting link (optional)<br><input id="meetingLink" type="text" placeholder="Zoom/Google Meet link"></label><br>
                <input type="submit" value="Create group" class="primary-btn mt-8">
            </form>
        </div>

        <script src="scripts/main.js" defer></script>
    </body>
</html>
